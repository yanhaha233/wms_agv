services:
  postgres:
    image: postgres:16
    container_name: wms_agv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wms_agv
      POSTGRES_USER: wms_agv
      POSTGRES_PASSWORD: wms_agv_dev
    ports:
      - "5432:5432"
    volumes:
      - wms_agv_postgres_data:/var/lib/postgresql/data

volumes:
  wms_agv_postgres_data:

